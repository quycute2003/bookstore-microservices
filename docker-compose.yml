services:
  postgres-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123
      POSTGRES_DB: default_db
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    # ---- THÊM ĐOẠN NÀY ----
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d default_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    volumes:
      - ./api-gateway:/app
    depends_on:
      postgres-db:
        condition: service_healthy

  auth-service:
    build: ./auth-service
    ports:
      - "8012:8000"
    volumes:
      - ./auth-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy

  user-service:
    build: ./user-service
    ports:
      - "8001:8000"
    volumes:
      - ./user-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      - POSTGRES_DB=user_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=123
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432

  cart-service:
    build: ./cart-service
    ports:
      - "8003:8000"
    volumes:
      - ./cart-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy

  # staff-service và manager-service đã gộp vào user-service

  catalog-service:
    build: ./catalog-service
    ports:
      - "8006:8000"
    volumes:
      - ./catalog-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy

  order-service:
    build: ./order-service
    ports:
      - "8007:8000"
    volumes:
      - ./order-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy

  ship-service:
    build: ./ship-service
    ports:
      - "8008:8000"
    volumes:
      - ./ship-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy

  pay-service:
    build: ./pay-service
    ports:
      - "8009:8000"
    volumes:
      - ./pay-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy

  # --- THÊM WORKERS ĐỂ LẮNG NGHE RABBITMQ ---
  order-worker:
    build: ./order-service
    command: python manage.py run_consumer
    volumes:
      - ./order-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  pay-worker:
    build: ./pay-service
    command: python manage.py run_consumer
    volumes:
      - ./pay-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ship-worker:
    build: ./ship-service
    command: python manage.py run_consumer
    volumes:
      - ./ship-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
  # ------------------------------------------

  comment-rate-service:
    build: ./comment-rate-service
    ports:
      - "8010:8000"
    volumes:
      - ./comment-rate-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy

  recommender-ai-service:
    build: ./recommender-ai-service
    ports:
      - "8011:8000"
    volumes:
      - ./recommender-ai-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5673:5672" # Cổng giao tiếp Message Broker
      - "15673:15672" # Cổng giao diện UI quản lý
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- NEO4J — Graph Knowledge Base ----
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"   # Browser UI: http://localhost:7474
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/lumiere123
      NEO4J_PLUGINS: "[]"
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ---- AI BEHAVIOR ANALYSIS SERVICE ----
  ai-behavior-service:
    build: ./ai-behavior-service
    env_file: ./ai-behavior-service/.env
    ports:
      - "8020:8020"
    volumes:
      - ./ai-behavior-service:/app
      - ai_models:/app/models
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started   # Không chờ healthy — GraphRetriever tự retry
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_HOST=postgres-db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=lumiere123

  product-service:
    build: ./product-service
    ports:
      - "8040:8000"
    volumes:
      - ./product-service:/app
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      - POSTGRES_DB=product_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=123
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432

volumes:
  postgres_data:
  ai_models:
  neo4j_data:
