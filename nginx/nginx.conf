worker_processes auto;

events { worker_connections 1024; }

http {
    # Log format rõ ràng để debug
    log_format main '$remote_addr - $request - $status '
                    '→ $upstream_addr [$request_time s]';
    access_log /var/log/nginx/access.log main;

    # Gzip
    gzip on;
    gzip_types text/html application/json text/css application/javascript;

    # Timeout
    proxy_connect_timeout 60s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;

    # Upload file
    client_max_body_size 20m;

    # ── Upstream blocks ─────────────────────────────────────
    upstream django_gateway       { server api-gateway:8000; }
    upstream auth_service         { server auth-service:8000; }
    upstream user_service         { server user-service:8000; }
    upstream product_service      { server product-service:8000; }
    upstream cart_service         { server cart-service:8000; }
    upstream order_service        { server order-service:8000; }
    upstream pay_service          { server pay-service:8000; }
    upstream ship_service         { server ship-service:8000; }
    upstream catalog_service      { server catalog-service:8000; }
    upstream comment_service      { server comment-rate-service:8000; }
    upstream ai_behavior_service  { server ai-behavior-service:8020; }
    upstream recommender_service  { server recommender-ai-service:8000; }

    server {
        listen 80;
        server_name localhost;

        # ── API routes → thẳng đến từng microservice ────────

        location /api/auth/ {
            proxy_pass http://auth_service/api/auth/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/customer/ {
            proxy_pass http://user_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/staff/ {
            proxy_pass http://user_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/user/ {
            proxy_pass http://user_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/product/ {
            proxy_pass http://product_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/book/ {
            proxy_pass http://product_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/clothes/ {
            proxy_pass http://product_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/cart/ {
            proxy_pass http://cart_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/order/ {
            proxy_pass http://order_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/pay/ {
            proxy_pass http://pay_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/ship/ {
            proxy_pass http://ship_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/catalog/ {
            proxy_pass http://catalog_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/comment/ {
            proxy_pass http://comment_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
        }

        location /api/ai-behavior/ {
            proxy_pass http://ai_behavior_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /api/ai/ {
            proxy_pass http://recommender_service/;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }

        # ── Mọi thứ còn lại → Django (HTML rendering) ───────
        location / {
            proxy_pass http://django_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_pass_header Authorization;
            proxy_redirect off;
        }
    }
}
