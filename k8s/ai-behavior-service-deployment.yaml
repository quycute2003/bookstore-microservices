apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-behavior-service
  labels:
    app: ai-behavior-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-behavior-service
  template:
    metadata:
      labels:
        app: ai-behavior-service
    spec:
      initContainers:
      - name: wait-for-postgres-db
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z postgres-db 5432; do echo waiting for postgres-db; sleep 2; done']
      - name: wait-for-neo4j
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z neo4j 7687; do echo waiting for neo4j; sleep 2; done']
      - name: wait-for-redis
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
      - name: ai-behavior-service
        image: dunguyenquy/ai-behavior-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8020
        env:
        - name: REDIS_HOST
          value: "redis"
        - name: REDIS_PORT
          value: "6379"
        - name: POSTGRES_HOST
          value: "postgres-db"
        - name: NEO4J_URI
          value: "bolt://neo4j:7687"
        - name: NEO4J_USER
          value: "neo4j"
        - name: NEO4J_PASSWORD
          value: "lumiere123"
        - name: POSTGRES_USER
          value: "admin"
        - name: POSTGRES_PASSWORD
          value: "123"
        - name: POSTGRES_DB
          value: "default_db"
        readinessProbe:
          tcpSocket:
            port: 8020
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 6
        resources:
          requests:
            memory: "512Mi"
            cpu: "50m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
